<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF_MERGE | 도면 취합 툴</title>
    
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

    <style>
        :root {
            --primary-color: #0046FF;
            --primary-hover: #0037CC;
            --primary-light: #F0F5FF;
            --bg-color: #F8F9FA;
            --border-color: #E9ECEF;
            --text-main: #212529;
            --text-sub: #6C757D;
            --danger-color: #ff4d4f;
        }

        * { box-sizing: border-box; font-family: "Pretendard", sans-serif; }
        body { background-color: var(--bg-color); margin: 0; color: var(--text-main); display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        header {
            width: 100%; padding: 15px 40px; background: #fff; border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100;
        }

        .logo { font-size: 24px; font-weight: 800; color: var(--primary-color); letter-spacing: -1px; cursor: pointer; user-select: none; }

        .header-right { display: flex; align-items: center; gap: 12px; }

        .undo-header-btn {
            background: #fff; border: 1px solid var(--border-color); padding: 6px 14px; border-radius: 20px;
            font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text-sub); transition: 0.2s;
            display: flex; align-items: center; gap: 6px;
        }
        .undo-header-btn.active { color: var(--primary-color); border-color: var(--primary-color); background: var(--primary-light); }
        .undo-header-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .status-badge { font-size: 13px; font-weight: 600; padding: 6px 16px; background: #eee; border-radius: 20px; }
        .status-badge b { color: var(--primary-color); }

        main { width: 100%; max-width: 1100px; padding: 30px 20px; padding-bottom: 100px; }

        .upload-container {
            background: #fff; border: 2px dashed var(--primary-color); border-radius: 12px;
            padding: 40px; text-align: center; cursor: pointer; margin-bottom: 25px; transition: 0.3s;
            position: relative;
        }
        .upload-container:hover { background: var(--primary-light); }
        .upload-icon { font-size: 48px; color: var(--primary-color); margin-bottom: 15px; }

        #upload-loader {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.9); flex-direction: column; align-items: center; justify-content: center;
            border-radius: 12px; z-index: 10;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid var(--primary-light);
            border-top: 4px solid var(--primary-color); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .controls-bar {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;
            background: #fff; padding: 12px 20px; border-radius: 8px; border: 1px solid var(--border-color);
        }

        .left-controls { display: flex; align-items: center; gap: 15px; }
        .view-options button {
            background: #F1F3F5; border: 1px solid #E9ECEF; padding: 8px 16px; border-radius: 6px;
            cursor: pointer; font-weight: 600; font-size: 13px;
        }
        .view-options button.active { background: var(--primary-color); color: #fff; border-color: var(--primary-color); }
        .grid-col-select { display: none; padding: 7px 10px; border-radius: 6px; border: 1px solid var(--border-color); font-size: 13px; font-weight: 600; cursor: pointer; background: #fff; }

        #file-list { display: flex; flex-direction: column; gap: 8px; min-height: 100px; }

        .file-item {
            background: #fff; border: 1px solid var(--border-color); border-radius: 8px;
            padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; transition: 0.1s;
            cursor: grab; position: relative; user-select: none;
        }
        .file-item.selected { border-color: var(--primary-color) !important; background-color: var(--primary-light) !important; box-shadow: 0 0 0 2px var(--primary-color); z-index: 5; }
        .sortable-ghost { opacity: 0.5; background: var(--primary-light) !important; border: 2px dashed var(--primary-color) !important; }

        .file-info { display: flex; align-items: center; gap: 15px; flex: 1; pointer-events: none; }
        .thumbnail-wrapper { width: 40px; height: 56px; background: #eee; border-radius: 4px; overflow: hidden; flex-shrink: 0; }
        .thumbnail { width: 100%; height: 100%; object-fit: cover; }
        .file-name { font-weight: 500; font-size: 14px; white-space: normal; word-break: break-all; }
        .file-meta { font-size: 12px; color: var(--text-sub); margin-top: 4px; display: block; }

        #file-list.grid { display: grid; gap: 20px; }
        #file-list.grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
        #file-list.grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
        #file-list.grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
        .grid .file-item { flex-direction: column; padding: 20px; text-align: center; }
        .grid .thumbnail-wrapper { width: 100%; height: 260px; margin-bottom: 12px; }
        .grid .file-info { flex-direction: column; width: 100%; }

        .action-btn { background: #fff; border: 1px solid var(--border-color); padding: 6px 12px; border-radius: 6px; cursor: pointer; color: var(--text-sub); font-size: 13px; position: relative; z-index: 10; }
        .action-btn:hover { border-color: var(--primary-color); color: var(--primary-color); }

        .bottom-panel { margin-top: 30px; background: #fff; padding: 30px; border-radius: 12px; border: 1px solid var(--border-color); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        label
